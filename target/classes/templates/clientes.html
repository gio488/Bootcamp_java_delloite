<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Minha Conta - Loja Sunhine</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; padding-top: 50px; }
        .container { max-width: 800px; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<div class="container shadow">
    <h2 class="text-center mb-4">Loja de revistas Sunshine ☀️</h2>

    <div th:if="${erro}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <span th:text="${erro}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <h4 class="mb-3">Crie sua conta </h4>
    <form th:action="@{/view/clientes/salvar}" th:object="${clienteDTO}" method="post" class="row g-3 mb-5">
        <input type="hidden" th:field="*{id}">

        <div class="col-md-6">
            <label class="form-label">Nome Completo:</label>
            <input type="text" th:field="*{nome}" class="form-control" placeholder="Digite seu nome" required>
        </div>

        <div class="col-md-6">
            <label class="form-label">CPF:</label>
            <input type="text" th:field="*{documento}" class="form-control" placeholder="Apenas números" required>
        </div>

        <div class="col-12 text-end">
            <button type="submit" class="btn btn-success px-4">Confirmar Dados</button>
            <a th:href="@{/view/clientes}" class="btn btn-secondary">Limpar</a>
        </div>
    </form>

    <hr>

    <div th:if="${cliente}" class="mt-4">
        <div class="card border-primary">
            <div class="card-header bg-primary text-white">
                <h5 class="mb-0">Dados da Conta: <span th:text="${cliente.nome}"></span></h5>
            </div>
            <div class="card-body">
                <p><strong>Nome:</strong> <span th:text="${cliente.nome}"></span></p>
                <p><strong>CPF Cadastrado:</strong> <span th:text="${cliente.cpf}"></span></p>

                <div class="mt-3">
                    <a th:href="@{/view/clientes/editar/{id}(id=${cliente.id})}" class="btn btn-warning btn-sm">Editar Perfil</a>
                    <a th:href="@{/view/clientes/excluir/{id}(id=${cliente.id})}" class="btn btn-danger btn-sm"
                       onclick="return confirm('Tem certeza que deseja excluir sua conta?')">Excluir Conta</a>
                </div>
            </div>
        </div>

        <div class="d-grid gap-2 mt-4">
            <a th:href="@{/view/revistas/{id}(id=${cliente.id})}" class="btn btn-success btn-lg">
                Prosseguir para as Revistas 🛒
            </a>
        </div>
    </div>

    <div th:unless="${cliente}" class="text-center mt-3 text-muted">
        <p>Cadastre-se acima para acessar o catálogo de revistas.</p>
    </div>
</div>

<script>
    function finalizarCompra() {
        alert("Pagamento em andamento... ⏳\nA Sunshine Store está processando seu pedido!");
    }
</script>

</body>
</html>
